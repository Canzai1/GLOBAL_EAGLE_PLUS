<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>产品中心 - TJW 导航栏预览</title>
<style>
:root{--navy:#082A5A;--deep:#06162E;--blue:#0B66C3;--text:#162033;--muted:#64748B;--light:#F5F8FC;--line:#DDE8F5;--shadow:0 18px 48px rgba(14,42,84,.12)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,"Microsoft YaHei","PingFang SC",sans-serif;color:var(--text);background:#fff}a{text-decoration:none;color:inherit}img{display:block;max-width:100%}.container{width:min(1200px,calc(100% - 32px));margin:0 auto}
.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.nav{height:82px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:14px}.brand-logo{width:58px;height:58px;border-radius:16px;border:1px solid var(--line);background:#fff;object-fit:contain}.brand strong{display:block;color:var(--navy);font-size:26px;letter-spacing:.12em;line-height:1}.brand span{display:block;margin-top:6px;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase}.nav-links{display:flex;align-items:center;gap:24px;color:#334155;font-size:14px;font-weight:700}.nav-links a:hover{color:var(--blue)}.nav-cta{padding:11px 18px;border-radius:999px;background:var(--navy);color:#fff!important}.menu-btn{display:none;border:0;background:none;font-size:30px;color:var(--navy)}
.hero-sub{padding:86px 0 70px;background:linear-gradient(135deg,#061A38,#0B66C3);color:#fff}.hero-sub h1{margin:0 0 16px;font-size:44px;letter-spacing:-.03em}.hero-sub p{margin:0;max-width:760px;color:#D8E8FF;line-height:1.8}.section{padding:70px 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 12px 30px rgba(14,42,84,.08);overflow:hidden}.card-img{height:220px;background:#EAF5FF}.card-img img{width:100%;height:100%;object-fit:cover}.card-body{padding:24px}.card h3{margin:0 0 10px;color:#111827}.card p{margin:0;color:var(--muted);line-height:1.7}.notice{margin-top:24px;padding:18px 20px;border-radius:18px;background:#F5F8FC;border:1px solid var(--line);color:#475569}.footer{background:#06162E;color:rgba(255,255,255,.68);padding:28px 0;margin-top:50px}
@media(max-width:1050px){.nav-links{display:none}.menu-btn{display:block}.nav-links.open{position:absolute;top:82px;left:16px;right:16px;display:flex;flex-direction:column;align-items:flex-start;padding:22px;border-radius:22px;background:#fff;box-shadow:var(--shadow)}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{height:72px}.brand-logo{width:48px;height:48px}.brand strong{font-size:22px}.brand span{font-size:10px}.grid{grid-template-columns:1fr}.hero-sub h1{font-size:34px}}
</style>
</head>
<body>

<header class="header">
  <div class="container nav">
    <a href="index.html#home" class="brand">
      <img src="assets/tjw-logo.webp" alt="TJW Logo" class="brand-logo"/>
      <div><strong>TJW</strong><span>TeJieWen Drone Technology</span></div>
    </a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <nav class="nav-links" id="navLinks">
      <a href="index.html#home">首页</a>
      <a href="index.html#products">产品中心</a>
      <a href="index.html#featured">产品视频</a>
      <a href="index.html#applications">应用场景</a>
      <a href="index.html#oem">OEM/ODM</a>
      <a href="index.html#production">生产服务</a>
      <a href="index.html#about" class="nav-cta">关于TJW</a>
    </nav>
  </div>
</header>

<section class="hero-sub">
  <div class="container">
    <h1>产品中心页面</h1>
    <p>这是二级页面导航栏同步预览：顶部导航已经与首页一致，并将“产品图库”改为“产品视频”。</p>
  </div>
</section>
<section class="section">
  <div class="container">
    <div class="grid">
      <article class="card"><div class="card-img"><img src="images/T1.jpg" alt="VTOL"/></div><div class="card-body"><h3>垂直起降复合翼无人机</h3><p>用于测绘、巡检、长航时任务。</p></div></article>
      <article class="card"><div class="card-img"><img src="images/T2.jpg" alt="Agricultural Drone"/></div><div class="card-body"><h3>农业喷洒无人机</h3><p>用于农田植保、果园喷洒和农业作业。</p></div></article>
      <article class="card"><div class="card-img"><img src="images/T4.jpg" alt="Inspection Drone"/></div><div class="card-body"><h3>巡检无人机</h3><p>用于电力巡检、设施巡查和应急任务。</p></div></article>
    </div>
    <div class="notice">预览说明：这里重点检查二级页面导航栏样式和链接，不代表最终产品页内容会被简化。</div>
  </div>
</section>
<footer class="footer"><div class="container">TJW 二级页面导航栏预览 · 未上传 GitHub</div></footer>

<script>
const btn=document.getElementById('menuBtn');
const nav=document.getElementById('navLinks');
btn&&btn.addEventListener('click',()=>nav.classList.toggle('open'));
document.querySelectorAll('.nav-links a').forEach(a=>a.addEventListener('click',()=>nav.classList.remove('open')));
</script>

</body>
</html>
